<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="arrow" x1="0" y1="1" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#06101e"/>

  <!-- Subtle glow from origin -->
  <circle cx="25" cy="78" r="38" fill="url(#glow)"/>

  <!-- Radar rings -->
  <circle cx="25" cy="78" r="15" fill="none" stroke="#1e40af" stroke-width="1.2" opacity="0.55"/>
  <circle cx="25" cy="78" r="28" fill="none" stroke="#1e3a8a" stroke-width="1" opacity="0.38"/>
  <circle cx="25" cy="78" r="42" fill="none" stroke="#172554" stroke-width="1" opacity="0.22"/>

  <!-- Arrow shaft -->
  <line x1="25" y1="78" x2="73" y2="22" stroke="url(#arrow)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Arrowhead -->
  <polygon points="73,22 54,30 63,42" fill="#38bdf8"/>

  <!-- Origin node -->
  <circle cx="25" cy="78" r="7" fill="#1d4ed8"/>
  <circle cx="25" cy="78" r="3.5" fill="#93c5fd"/>

  <!-- Lead target dots -->
  <circle cx="62" cy="16" r="3.2" fill="#60a5fa" opacity="0.75"/>
  <circle cx="80" cy="36" r="2.5" fill="#3b82f6" opacity="0.55"/>
  <circle cx="82" cy="62" r="2" fill="#2563eb" opacity="0.4"/>
</svg>
