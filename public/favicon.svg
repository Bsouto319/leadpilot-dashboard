<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="#1a3564"/>
  <!-- Back mountain (left, smaller) -->
  <polygon points="28,72 6,72 28,32" fill="#3b6dd4" opacity="0.7"/>
  <!-- Main mountain (center, tallest) -->
  <polygon points="50,10 88,72 12,72" fill="#4a7de0"/>
  <!-- Snow cap -->
  <polygon points="50,10 63,40 37,40" fill="white" opacity="0.95"/>
  <!-- Right mountain (partial) -->
  <polygon points="74,72 55,72 74,35 94,72" fill="#3b6dd4" opacity="0.55"/>
  <!-- Ground base -->
  <rect x="0" y="72" width="100" height="28" rx="0" fill="#132950"/>
  <!-- House body -->
  <rect x="38" y="72" width="24" height="14" fill="#e8f0ff"/>
  <!-- Roof -->
  <polygon points="35,72 50,59 65,72" fill="white"/>
  <!-- Door -->
  <rect x="46" y="79" width="8" height="7" fill="#132950"/>
  <!-- Left window -->
  <rect x="40" y="75" width="5" height="4" rx="0.5" fill="#132950" opacity="0.5"/>
  <!-- Right window -->
  <rect x="55" y="75" width="5" height="4" rx="0.5" fill="#132950" opacity="0.5"/>
</svg>
